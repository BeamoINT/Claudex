name: Cross-platform tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  workflow_call:
    inputs:
      ref:
        description: Git ref to test (defaults to the triggering ref)
        required: false
        type: string

permissions:
  contents: read

jobs:
  unix:
    name: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Run isolated Bash tests
        run: ./test.sh

  windows:
    name: windows-latest
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Run isolated PowerShell tests
        shell: powershell
        run: .\test.ps1

  legacy-linux-node:
    name: ubuntu-20.04-managed-node
    runs-on: ubuntu-latest
    container: ubuntu:20.04
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
      - name: Verify Node 18+ fallback on the oldest supported Ubuntu
        run: |
          node_root="$(dirname "$(dirname "$(readlink -f "$(command -v node)")")")"
          CLAUDEX_TEST_MODE=1 CLAUDEX_TEST_MANAGED_NODE_DIR="$node_root" ./tests/legacy-linux-node.sh

  package-artifacts:
    name: package-artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
      - name: Verify package metadata and Node tests
        run: npm test
      - name: Verify reproducible and type-safe release archives
        run: ./scripts/check-release-artifacts.sh
