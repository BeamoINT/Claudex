name: Feature request
description: Propose a focused improvement to Claudex
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Please describe the user problem before proposing an implementation. For open-ended ideas and setup questions, start a GitHub Discussion instead.
  - type: checkboxes
    id: prerequisites
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and discussions.
          required: true
        - label: This request is about Claudex rather than an upstream provider entitlement.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user need or limitation should Claudex address?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the desired user-visible result without assuming a specific implementation.
    validations:
      required: true
  - type: dropdown
    id: platforms
    attributes:
      label: Affected platforms
      multiple: true
      options:
        - macOS
        - Linux
        - WSL
        - Windows
        - All platforms
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds or other designs have you considered?
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add mockups, examples, or relevant upstream documentation.
